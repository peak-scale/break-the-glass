name: Build cli
permissions: {}
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - init
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: goreleaser test
        run: make cli-test-release