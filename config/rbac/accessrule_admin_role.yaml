# This rule is not used by the project break-the-glass itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over addons.projectcapsule.dev.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: break-the-glass
    app.kubernetes.io/managed-by: kustomize
  name: accessrule-admin-role
rules:
- apiGroups:
  - addons.projectcapsule.dev
  resources:
  - accessrules
  verbs:
  - '*'
- apiGroups:
  - addons.projectcapsule.dev
  resources:
  - accessrules/status
  verbs:
  - get
