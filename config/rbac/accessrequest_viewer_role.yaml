# This rule is not used by the project access-requests itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to addons.projectcapsule.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: access-requests
    app.kubernetes.io/managed-by: kustomize
  name: accessrequest-viewer-role
rules:
- apiGroups:
  - addons.projectcapsule.dev
  resources:
  - accessrequests
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - addons.projectcapsule.dev
  resources:
  - accessrequests/status
  verbs:
  - get
